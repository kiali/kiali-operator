name: Molecule Tests

on:
  pull_request:
    branches: [master]
    paths:
      - 'molecule/**'
      - 'roles/default/**'
      - '.github/workflows/molecule-tests.yml'

jobs:
  molecule-tests:
    name: Molecule Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kiali-operator source
      uses: actions/checkout@v5
      with:
        path: kiali-operator
        fetch-depth: 0

    - name: Determine which molecule tests to run
      id: determine-tests
      env:
        BASE_REF: ${{ github.base_ref }}
      run: |
        cd kiali-operator

        # Always run config-values-test
        TESTS_TO_RUN="config-values-test"

        # Check if any specific molecule tests were modified
        CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
        echo "Changed files:"
        echo "$CHANGED_FILES"

        # Extract molecule test names from changed files
        CHANGED_MOLECULE_TESTS=$(echo "$CHANGED_FILES" | grep '^molecule/' | cut -d'/' -f2 | grep -E '.*-test$' | sort -u)

        if [ -n "$CHANGED_MOLECULE_TESTS" ]; then
          echo "Detected changes in molecule tests:"
          echo "$CHANGED_MOLECULE_TESTS"

          # Add changed tests to the list (avoid duplicates)
          for test in $CHANGED_MOLECULE_TESTS; do
            if [[ "$TESTS_TO_RUN" != *"$test"* ]]; then
              TESTS_TO_RUN="$TESTS_TO_RUN $test"
            fi
          done
        fi

        echo "Tests to run: $TESTS_TO_RUN"

        # Validate that we have tests to run
        if [ -z "$TESTS_TO_RUN" ]; then
          echo "ERROR: No tests determined to run"
          exit 1
        fi

        echo "TESTS_TO_RUN=$TESTS_TO_RUN" >> $GITHUB_OUTPUT

    - name: Determine Kiali server and helm-charts source branches and forks
      id: determine-sources
      env:
        PR_BRANCH: ${{ github.head_ref }}
        PR_AUTHOR: ${{ github.actor }}
        PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      run: |
        # Priority: PR branch in author's fork -> PR branch in kiali repo -> master in kiali repo

        echo "PR branch: $PR_BRANCH"
        echo "PR author: $PR_AUTHOR"
        echo "PR repository: $PR_REPO"

        # Function to find branch/fork for a given repository.
        # Writes two lines to stdout: branch and fork (caller captures via readarray).
        find_repo_source() {
          local repo_name="$1"

          echo "=== Finding source for $repo_name ===" >&2

          local candidate_branches=("$PR_BRANCH" "master")

          for branch in "${candidate_branches[@]}"; do
            echo "Evaluating $repo_name branch candidate: [$branch]" >&2

            if [ -z "$branch" ]; then
              echo " -> branch skipped (empty)" >&2
              continue
            fi

            local candidate_owners=()
            if [ "$branch" = "master" ]; then
              candidate_owners+=("kiali")
              if [ -n "$PR_AUTHOR" ]; then
                candidate_owners+=("$PR_AUTHOR")
              fi
            else
              if [ -n "$PR_AUTHOR" ]; then
                candidate_owners+=("$PR_AUTHOR")
              fi
              candidate_owners+=("kiali")
            fi

            for owner in "${candidate_owners[@]}"; do
              local repo_url="https://github.com/${owner}/${repo_name}.git"
              echo "Evaluating $repo_name branch [$branch] of owner [$owner]: $repo_url" >&2

              if git ls-remote --exit-code --heads "$repo_url" "refs/heads/$branch" >/dev/null 2>&1; then
                echo " -> branch [$branch] exists in ${owner}/${repo_name}" >&2
                echo "$branch"
                echo "${owner}/${repo_name}"
                return 0
              else
                echo " -> branch [$branch] not found in ${owner}/${repo_name}" >&2
              fi
            done
            echo " -> branch [$branch] not found in candidate owners" >&2
          done

          echo "Using fallback: master branch from kiali/${repo_name}" >&2
          echo "master"
          echo "kiali/${repo_name}"
          return 1
        }

        KIALI_OPERATOR_FORK="$PR_REPO"
        KIALI_OPERATOR_BRANCH="$PR_BRANCH"
        echo "Selected kiali-operator source: ${KIALI_OPERATOR_FORK}:${KIALI_OPERATOR_BRANCH}"

        readarray -t kiali_result < <(find_repo_source "kiali")
        KIALI_BRANCH="${kiali_result[0]}"
        KIALI_FORK="${kiali_result[1]}"
        echo "Selected Kiali server source: ${KIALI_FORK}:${KIALI_BRANCH}"

        readarray -t helm_result < <(find_repo_source "helm-charts")
        HELM_BRANCH="${helm_result[0]}"
        HELM_FORK="${helm_result[1]}"
        echo "Selected helm-charts source: ${HELM_FORK}:${HELM_BRANCH}"

        echo "KIALI_BRANCH=$KIALI_BRANCH" >> $GITHUB_OUTPUT
        echo "KIALI_FORK=$KIALI_FORK" >> $GITHUB_OUTPUT
        echo "HELM_BRANCH=$HELM_BRANCH" >> $GITHUB_OUTPUT
        echo "HELM_FORK=$HELM_FORK" >> $GITHUB_OUTPUT
        echo "KIALI_OPERATOR_BRANCH=$KIALI_OPERATOR_BRANCH" >> $GITHUB_OUTPUT
        echo "KIALI_OPERATOR_FORK=$KIALI_OPERATOR_FORK" >> $GITHUB_OUTPUT

    - name: Install Helm
      uses: Azure/setup-helm@v4.3.1
      with:
        version: 'v3.18.4'

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: false

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Enable corepack for Yarn 4
      run: corepack enable

    - name: Free Disk Space
      run: |
        echo "=== Disk space before cleanup ==="
        df -h

        echo "=== Cleaning up large directories ==="
        # Remove large pre-installed packages that we don't need
        [ -d /usr/share/dotnet ] && sudo rm -rf /usr/share/dotnet || echo "No dotnet to remove"
        [ -d /usr/local/lib/android ] && sudo rm -rf /usr/local/lib/android || echo "No android to remove"
        [ -d /opt/ghc ] && sudo rm -rf /opt/ghc || echo "No ghc to remove"
        [ -d /opt/hostedtoolcache/CodeQL ] && sudo rm -rf /opt/hostedtoolcache/CodeQL || echo "No CodeQL to remove"

        echo "=== Cleaning up Docker/container resources ==="
        # Clean up docker and podman resources - podman is used for molecule image builds
        docker system prune -af --volumes
        podman system prune -af --volumes

        echo "=== Cleaning apt cache ==="
        sudo apt-get clean

        echo "=== Disk space after cleanup ==="
        df -h

    - name: Checkout and run molecule tests
      env:
        TESTS_TO_RUN: ${{ steps.determine-tests.outputs.TESTS_TO_RUN }}
        KIALI_FORK: ${{ steps.determine-sources.outputs.KIALI_FORK }}
        KIALI_BRANCH: ${{ steps.determine-sources.outputs.KIALI_BRANCH }}
        HELM_FORK: ${{ steps.determine-sources.outputs.HELM_FORK }}
        HELM_BRANCH: ${{ steps.determine-sources.outputs.HELM_BRANCH }}
        KIALI_OPERATOR_FORK: ${{ steps.determine-sources.outputs.KIALI_OPERATOR_FORK }}
        KIALI_OPERATOR_BRANCH: ${{ steps.determine-sources.outputs.KIALI_OPERATOR_BRANCH }}
      run: |
        set -e

        echo "=== Configuration ==="
        echo "Tests to run: $TESTS_TO_RUN"
        echo "Kiali server source: ${KIALI_FORK}:${KIALI_BRANCH}"
        echo "Helm charts source: ${HELM_FORK}:${HELM_BRANCH}"
        echo "Operator source: ${KIALI_OPERATOR_FORK}:${KIALI_OPERATOR_BRANCH}"
        echo "Istio version: Will be determined by ci-kind-molecule-tests.sh"

        echo "=== Cloning Kiali server repository ==="
        git clone --single-branch --branch "$KIALI_BRANCH" "https://github.com/${KIALI_FORK}.git" kiali-server-temp

        cd kiali-server-temp

        echo "=== Running molecule tests ==="
        ./hack/ci-kind-molecule-tests.sh \
          --client-exe "$(which kubectl)" \
          --kind-exe "$(which kind)" \
          --all-tests "$TESTS_TO_RUN" \
          --git-clone-protocol https \
          --irc-room "" \
          --upload-logs false \
          --rebuild-cluster true \
          -ci true \
          --operator-installer helm \
          --olm-enabled false \
          --hydra-enabled true \
          --use-dev-images true \
          --kiali-fork "$KIALI_FORK" \
          --kiali-branch "$KIALI_BRANCH" \
          --helm-fork "$HELM_FORK" \
          --helm-branch "$HELM_BRANCH" \
          --kiali-operator-fork "$KIALI_OPERATOR_FORK" \
          --kiali-operator-branch "$KIALI_OPERATOR_BRANCH"

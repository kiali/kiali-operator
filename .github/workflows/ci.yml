name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      with:
        # Fetch enough history to compare CRDs against base branch for backward compatibility check
        fetch-depth: 0

    - name: Fetch origin/master for CRD compatibility check
      run: |
        git fetch origin master:refs/remotes/origin/master || true

    - name: Validate OLM metadata
      env:
        YQ_VERSION: v4.40.5
      run: |
        sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
        wget -qO /tmp/yq_checksums "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums"
        echo "$(grep 'yq_linux_amd64' /tmp/yq_checksums | awk '{print $1}')  /usr/local/bin/yq" | sha256sum --check
        sudo chmod +x /usr/local/bin/yq
        make validate

    - name: Validate CR
      run: |
        kind create cluster
        CLIENT_EXE=kubectl make validate-cr
        kind delete cluster

    - name: Build operator
      run: make build
